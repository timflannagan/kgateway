# Default values for the kgateway chart.
global:
  image:
    registry: quay.io/solo-io
    pullPolicy: IfNotPresent
  securitySettings: {}

kubeGateway:
  enabled: true

  # The chart deploys a GatewayClass named "gloo-gateway" and a default GatewayParameters CR named "gloo-gateway" in the specified namespace.
  gatewayParameters:
    glooGateway:
      envoyContainer:
        image:
          repository: gloo-envoy-wrapper
          tag: 1.0.0
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10101
          capabilities:
            drop:
              - ALL
            add:
              - NET_BIND_SERVICE

      proxyDeployment:
        replicas: 1

      service:
        type: LoadBalancer

      sdsContainer:
        image:
          repository: sds
          tag: 1.0.0
        logLevel: info

# Controls whether we create the kgateway-system namespace
namespace:
  create: true

# The Gloo Gateway "settings" resource is not strictly needed in this minimal chart, but we'll keep it if you decide to expand or store config in the future.
settings:
  create: true