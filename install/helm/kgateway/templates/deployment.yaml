apiVersion: apps/v1
kind: Deployment
metadata:
  name: kgateway-controller
  namespace: kgateway-system
  labels:
    {{- include "kgateway.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "kgateway-controller"
  template:
    metadata:
      labels:
        app: "kgateway-controller"
        {{- include "kgateway.labels" . | nindent 8 }}
    spec:
      serviceAccountName: kgateway-controller
      containers:
        - name: kgateway-controller
          # For demonstration, uses a hypothetical controller image
          image: "quay.io/solo-io/kgateway-controller:1.0.0"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9443
              name: metrics
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9443
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9443
            initialDelaySeconds: 3
            periodSeconds: 10
---
# In a real scenario, you might define your CRDs and logic in the code here or point to them externally
# This is minimal scaffolding for a user to expand upon.